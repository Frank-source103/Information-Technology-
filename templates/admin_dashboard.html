<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>
<h1>Admin Dashboard</h1>
<a href="{{ url_for('logout') }}">Logout</a>
<hr>
{% for page in pages %}
<h2>Edit {{ page.capitalize() }} Page</h2>
<form method="POST">
    <input type="hidden" name="page" value="{{ page }}">
    <textarea name="body" rows="5" cols="80">{{ content_dict[page] }}</textarea><br>
    <button type="submit">Save {{ page.capitalize() }}</button>
</form>
<hr>
{% endfor %}
</body>
</html>
